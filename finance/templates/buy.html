{% extends "layout.html" %}

{% block title %}
    Buy
{% endblock %}

{% block main %}
<form method="post">
    <div class="mb-3">
        <input autocomplete="off" class="form-control mx-auto w-auto" placeholder="Symbol" name="symbol" type="text" autofocus>
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" placeholder="Shares" name="shares" type="number" min="1">
    </div>
    <button class="btn btn-primary" type="submit">Buy Shares</button>
</form>
{% endblock %}
